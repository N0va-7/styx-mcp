<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-label="styx-mcp architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="920" height="420" rx="16" fill="url(#bg)"/>

  <!-- title -->
  <text x="40" y="42" fill="#f8fafc" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-size="20" font-weight="700">styx-mcp</text>
  <text x="140" y="42" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14">MCP-native multi-hop jump network</text>

  <!-- Operator panel -->
  <rect x="32" y="68" width="380" height="310" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="52" y="96" fill="#38bdf8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="1.2">OPERATOR HOST</text>

  <!-- LLM -->
  <rect x="56" y="118" width="150" height="64" rx="12" fill="url(#cardA)" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="131" y="146" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600">LLM Client</text>
  <text x="131" y="166" text-anchor="middle" fill="#93c5fd" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Cursor · Claude · Grok</text>

  <!-- tools -->
  <rect x="232" y="118" width="150" height="64" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
  <text x="307" y="146" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600">Local tools</text>
  <text x="307" y="166" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">curl · scanners</text>

  <!-- MCP -->
  <rect x="56" y="220" width="150" height="52" rx="12" fill="#312e81" stroke="#818cf8" stroke-width="1.2"/>
  <text x="131" y="251" text-anchor="middle" fill="#e0e7ff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600">MCP stdio</text>

  <!-- controller -->
  <rect x="232" y="210" width="150" height="72" rx="12" fill="url(#cardA)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="307" y="242" text-anchor="middle" fill="#f0f9ff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">controller</text>
  <text x="307" y="262" text-anchor="middle" fill="#7dd3fc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">SOCKS · backward</text>

  <!-- arrows operator -->
  <path d="M131 182 L131 218" stroke="#818cf8" stroke-width="2" fill="none" marker-end="url(#arrowCyan)"/>
  <path d="M307 182 L307 208" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M206 246 L230 246" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrowCyan)"/>
  <text x="100" y="208" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">tools/call</text>

  <text x="56" y="340" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Control plane is MCP — no admin TUI required</text>

  <!-- Remote panel -->
  <rect x="448" y="68" width="440" height="310" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="468" y="96" fill="#4ade80" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="1.2">REMOTE / LAB NETWORK</text>

  <!-- agent entry -->
  <rect x="480" y="140" width="140" height="72" rx="12" fill="#14532d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="550" y="172" text-anchor="middle" fill="#f0fdf4" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">agent</text>
  <text x="550" y="192" text-anchor="middle" fill="#86efac" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">entry foothold</text>

  <!-- agent pivot -->
  <rect x="680" y="140" width="140" height="72" rx="12" fill="#14532d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="750" y="172" text-anchor="middle" fill="#f0fdf4" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">agent</text>
  <text x="750" y="192" text-anchor="middle" fill="#86efac" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">pivot hop</text>

  <!-- targets -->
  <rect x="580" y="280" width="200" height="64" rx="12" fill="#422006" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="680" y="308" text-anchor="middle" fill="#fef3c7" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600">Internal targets</text>
  <text x="680" y="328" text-anchor="middle" fill="#fcd34d" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">exit · start_scan · SOCKS</text>

  <!-- wire hop -->
  <path d="M382 246 L478 176" stroke="url(#accent)" stroke-width="2.5" fill="none" marker-end="url(#arrowCyan)" stroke-dasharray="0"/>
  <text x="400" y="200" fill="#7dd3fc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">encrypted</text>

  <path d="M620 176 L678 176" stroke="#4ade80" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="628" y="168" fill="#86efac" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">multi-hop</text>

  <path d="M750 212 L750 278" stroke="#f59e0b" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M550 212 L620 278" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>

  <text x="468" y="360" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Same-commit controller + agent after protocol changes</text>
</svg>
