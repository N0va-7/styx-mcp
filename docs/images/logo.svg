<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="styx-mcp logo">
  <!-- Multi-hop river path: controller → agents → exit -->
  <rect width="128" height="128" rx="28" fill="#F8FAFC"/>
  <path d="M28 36
           C 48 36, 52 56, 64 64
           C 76 72, 80 92, 100 92"
        fill="none" stroke="#0F172A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- nodes: entry · hop (accent) · exit -->
  <circle cx="28" cy="36" r="11" fill="#0F172A"/>
  <circle cx="28" cy="36" r="4.5" fill="#F8FAFC"/>
  <circle cx="64" cy="64" r="12" fill="#06B6D4"/>
  <circle cx="64" cy="64" r="5" fill="#FFFFFF"/>
  <circle cx="100" cy="92" r="11" fill="#0F172A"/>
  <circle cx="100" cy="92" r="4.5" fill="#F8FAFC"/>
</svg>
