<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-label="traffic modes">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="sh3" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="920" height="300" rx="16" fill="url(#bg3)"/>
  <text x="36" y="38" fill="#f8fafc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" font-weight="700">Which tool for which traffic?</text>
  <text x="320" y="38" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">pick by where the listener lives</text>

  <!-- card 1 socks -->
  <g filter="url(#sh3)">
    <rect x="28" y="64" width="210" height="200" rx="14" fill="#0b1220" stroke="#38bdf8" stroke-width="1.4"/>
    <rect x="28" y="64" width="210" height="40" rx="14" fill="#1e3a5f"/>
    <rect x="28" y="88" width="210" height="16" fill="#1e3a5f"/>
    <text x="133" y="90" text-anchor="middle" fill="#7dd3fc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700">start_socks</text>
    <text x="48" y="130" fill="#e2e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Listen on</text>
    <text x="48" y="150" fill="#38bdf8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600">controller host</text>
    <text x="48" y="180" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Exit via selected</text>
    <text x="48" y="200" fill="#86efac" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">agent node_id</text>
    <text x="48" y="232" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Local curl / scanners</text>
  </g>

  <!-- card 2 backward -->
  <g filter="url(#sh3)">
    <rect x="252" y="64" width="210" height="200" rx="14" fill="#0b1220" stroke="#818cf8" stroke-width="1.4"/>
    <rect x="252" y="64" width="210" height="40" rx="14" fill="#312e81"/>
    <rect x="252" y="88" width="210" height="16" fill="#312e81"/>
    <text x="357" y="90" text-anchor="middle" fill="#c4b5fd" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700">start_backward</text>
    <text x="272" y="130" fill="#e2e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Listen on</text>
    <text x="272" y="150" fill="#a78bfa" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600">controller host</text>
    <text x="272" y="180" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Map one local port →</text>
    <text x="272" y="200" fill="#86efac" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">one internal ip:port</text>
    <text x="272" y="232" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Single-port tunnel</text>
  </g>

  <!-- card 3 forward -->
  <g filter="url(#sh3)">
    <rect x="476" y="64" width="210" height="200" rx="14" fill="#0b1220" stroke="#4ade80" stroke-width="1.4"/>
    <rect x="476" y="64" width="210" height="40" rx="14" fill="#14532d"/>
    <rect x="476" y="88" width="210" height="16" fill="#14532d"/>
    <text x="581" y="90" text-anchor="middle" fill="#86efac" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700">start_forward</text>
    <text x="496" y="130" fill="#e2e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Listen on</text>
    <text x="496" y="150" fill="#4ade80" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600">agent host</text>
    <text x="496" y="180" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Not a local SOCKS</text>
    <text x="496" y="200" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">for controller tools</text>
    <text x="496" y="232" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Pivot-side listener</text>
  </g>

  <!-- card 4 scan -->
  <g filter="url(#sh3)">
    <rect x="700" y="64" width="192" height="200" rx="14" fill="#0b1220" stroke="#fbbf24" stroke-width="1.4"/>
    <rect x="700" y="64" width="192" height="40" rx="14" fill="#713f12"/>
    <rect x="700" y="88" width="192" height="16" fill="#713f12"/>
    <text x="796" y="90" text-anchor="middle" fill="#fcd34d" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700">start_scan</text>
    <text x="720" y="130" fill="#e2e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">No local listen</text>
    <text x="720" y="150" fill="#fbbf24" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600">runs on agent</text>
    <text x="720" y="180" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Structured open ports</text>
    <text x="720" y="200" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">+ fingerprint + refs</text>
    <text x="720" y="232" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">No SOCKS required</text>
  </g>
</svg>
