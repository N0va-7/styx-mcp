schema: spec-driven

# Shown to AI when creating OpenSpec artifacts (proposal / design / tasks).
context: |
  styx-mcp: MCP multi-hop proxy. Controller speaks stdio MCP; agents join over
  the wire and exit traffic on the far side. Inspired by Stowaway (MIT) for
  multi-hop topology; wire identity, crypto, and MCP tools are this repo's.

  Stack: Go (see go.mod). Layout: cmd/{controller,agent}, pkg/{mcp,controller,
  node,protocol,topology,tasks,transport}. Topology mutations go through
  Topology.Do (serialized).

  Defaults: agent connects to STYX_LISTEN (default :19137). One controller per
  listen port. Secret via STYX_SECRET or .grok/styx.secret (never commit).

  Critical product facts:
  - start_socks: SOCKS5 listens on the controller host; traffic exits via node_id.
  - start_forward: listen is on the agent, not a local SOCKS substitute.
  - start_listener / connect_node / start_forward wait for agent ACK before
    marking task ready:true (AfterSendWait).
  - Controller Start() hard-fails if passive bind fails (MCP must not look healthy
    with no listen).
  - Wire transport "raw" is implemented; websocket is rejected (not a silent stub).
  - Controller and agent must be built from the same commit after protocol changes.

  Workflow (default for ALL work — features, fixes, and test backfill):
  1. Read matching openspec/specs/<capability>/spec.md; name Requirement/Scenario.
     If missing, add scenario (or ADDED requirement) before or with the code change.
  2. Create openspec/changes/<kebab-name>/ with proposal.md + tasks.md always.
     Add specs/ delta when behavior/contract changes; design.md for protocol,
     multi-package, or cross-process work.
  3. Implement tasks; tests map to Scenarios (unit and/or MCP + real agent).
  4. openspec validate --all; go test on touched packages.
  5. openspec archive when specs delta is done; conventional commit.

  AGENTS.md is ops + this workflow. openspec/specs is the behavioral contract.
  Do not treat small fixes as exempt from OpenSpec — slim proposal/tasks are OK,
  skipping the change folder is not.

rules:
  proposal:
    - Always create a change for fix/feat/test work; slim is fine, skip is not
    - Keep under ~400 words; Why / What Changes / Capabilities / Non-goals
    - Map Capabilities to openspec/specs/<name> or new kebab-case names
    - If no requirement change (pure bugfix matching existing scenario), say so
      under Modified Capabilities as empty and note the scenario being hardened
  specs:
    - Normative text MUST use SHALL or MUST
    - Every requirement needs at least one #### Scenario with WHEN/THEN
    - Prefer behavior over package/file names
    - New tests that pin behavior SHOULD appear as scenarios if not already listed
  design:
    - Required when wire protocol, crypto, framing, or multi-hop path changes
    - Note same-commit controller/agent rebuild when wire format changes
  tasks:
    - Each task names package and how it maps to a Scenario (unit vs MCP e2e)
    - Include openspec validate --all and go test as final checks
    - Keep tasks small enough to check off independently
